name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Build CLI for integration tests
        run: swift build --product loadout
      - name: Run tests
        run: LOADOUT_TEST_BINARY=$PWD/.build/debug/loadout swift test
      - name: Release build
        run: swift build -c release --product loadout --product LoadoutApp